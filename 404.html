<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Principle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;600&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#00060f;--ink:#eaf1fb;--ink-soft:#a4b6d2;--ink-faint:#5f739a;--cyan:#01beff;--blue-2:#348efd;--line:rgba(120,160,220,.13)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:'Outfit',sans-serif;min-height:100vh;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:28px;position:relative;overflow:hidden}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(110% 70% at 18% -4%,rgba(1,97,252,.16),transparent 55%),radial-gradient(110% 70% at 86% 6%,rgba(1,190,255,.10),transparent 52%)}
  .wrap{position:relative;z-index:1;max-width:34rem}
  .code{font-family:'Geist Mono',monospace;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:22px}
  h1{font-weight:600;font-size:clamp(2rem,6vw,3.2rem);line-height:1.05;letter-spacing:-.02em}
  h1 .grad{background:linear-gradient(100deg,var(--cyan),var(--blue-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  p{margin-top:18px;color:var(--ink-soft);font-weight:300;font-size:1.05rem}
  a.home{display:inline-flex;align-items:center;gap:.6em;margin-top:30px;font-family:'Geist Mono',monospace;
    font-size:13px;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--bg);
    background:var(--cyan);padding:13px 24px;border-radius:4px;font-weight:600;transition:transform .2s,box-shadow .2s}
  a.home:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(1,190,255,.28)}
  .brand{margin-top:34px;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-faint)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">[ 404 / not found ]</div>
    <h1>There is no page here — <span class="grad">but what we make.</span></h1>
    <p>This route doesn't exist yet. Head back and start from the beginning.</p>
    <a class="home" href="/">Return →</a>
    <div class="brand">Principle</div>
  </div>
</body>
</html>
